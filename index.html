<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Rental Property Finder</title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <h1 class="logo">MyHome</h1>

        <ul class="nav-links">

            <li><a href="#">Home</a></li>

            <li><a href="#">Properties</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>



    <!-- HERO SECTION -->

    <section class="hero">

        <div class="hero-content">

            <h1>Find Your Perfect Home</h1>

            <p>Best rental properties in your city</p>

            <button>Explore Now</button>

        </div>

    </section>



    <!-- PROPERTY CARDS -->

    <section class="properties">

        <h2 class="section-title">
            Featured Properties
        </h2>

        <div class="card-container">


            <!-- CARD 1 -->

            <div class="card">

                <img src="https://picsum.photos/300/200?1">

                <h3>Luxury Apartment</h3>

                <p>Lahore, Pakistan</p>

                <h4>$500/month</h4>

                <button>View Details</button>

            </div>



            <!-- CARD 2 -->

            <div class="card">

                <img src="https://picsum.photos/300/200?2">

                <h3>Modern House</h3>

                <p>Karachi, Pakistan</p>

                <h4>$800/month</h4>

                <button>View Details</button>

            </div>



            <!-- CARD 3 -->

            <div class="card">

                <img src="https://picsum.photos/300/200?3">

                <h3>Family Flat</h3>

                <p>Islamabad, Pakistan</p>

                <h4>$650/month</h4>

                <button>View Details</button>

            </div>

        </div>

    </section>



    <script src="script.js"></script>

</body>

</html>
